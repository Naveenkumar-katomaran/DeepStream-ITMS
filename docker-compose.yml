services:
  itms-va:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itms_deepstreamv1
    image: itms_deepstreamv1:latest
    runtime: nvidia
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility,graphics,display
      - NVIDIA_DISABLE_REQUIRE=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/.Xauthority:/root/.Xauthority
      - .:/app
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute, utility, graphics]
    entrypoint: ./entrypoint.sh
